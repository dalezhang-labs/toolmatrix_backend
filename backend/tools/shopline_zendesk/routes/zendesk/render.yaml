services:
  - type: web
    name: shopline-fastapi-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: ./
    plan: starter
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: shopline-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "false"
      - key: LOG_LEVEL
        value: INFO
      - key: PORT
        value: "6100"

databases:
  - name: shopline-db
    databaseName: shopline
    user: shopline 